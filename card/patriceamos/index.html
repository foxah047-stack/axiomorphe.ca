<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0E14">
<title>Patrice Amos — Axiomorphe</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E14;
    --ink:#F0F4F8;
    --muted:#7C8794;
    --cyan:#00E5FF;
    --orange:#FF6A00;
    --line:rgba(0,229,255,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1100px 620px at 50% -8%, rgba(0,229,255,0.10), transparent 58%),
      radial-gradient(700px 500px at 80% 110%, rgba(255,106,0,0.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 26px calc(48px + env(safe-area-inset-bottom));
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(240,244,248,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,244,248,.022) 1px, transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 72%);
            mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 72%);
    pointer-events:none;
    z-index:0;
  }

  /* language toggle */
  .lang{
    position:fixed;
    top:calc(16px + env(safe-area-inset-top));
    right:calc(16px + env(safe-area-inset-right));
    z-index:5;
    display:flex;align-items:center;gap:2px;
    font-size:13px;font-weight:600;letter-spacing:.04em;
    background:rgba(10,14,20,.5);
    border:1px solid rgba(240,244,248,.10);
    border-radius:999px;
    padding:4px;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .lang button{
    font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.04em;
    color:var(--muted);
    background:transparent;border:none;cursor:pointer;
    padding:5px 11px;border-radius:999px;
    transition:color .2s ease, background .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .lang button.active{ color:#04181C; background:var(--cyan); }

  .card{
    position:relative;z-index:1;width:100%;max-width:440px;
    display:flex;flex-direction:column;align-items:center;text-align:center;
  }

  /* ---- LOGO + reveal (preserved) ---- */
  .logo-axm{ width:min(320px, 86vw); height:auto; display:block; }
  .axm-dot{ opacity:0; transform-box:fill-box; transform-origin:center;
    animation:axmDotIn .55s cubic-bezier(.22,1,.36,1) forwards; }
  .axm-dot.d1{animation-delay:.05s;} .axm-dot.d2{animation-delay:.12s;}
  .axm-dot.d3{animation-delay:.19s;} .axm-dot.d4{animation-delay:.26s;}
  .axm-dot.d5{animation-delay:.33s;} .axm-dot.d6{animation-delay:.40s;}
  @keyframes axmDotIn{
    0%{opacity:0; transform:translate(-14px,10px) scale(.2);}
    100%{opacity:var(--o,1); transform:translate(0,0) scale(1);}
  }
  .axm-link{ stroke-dasharray:30; stroke-dashoffset:30; opacity:0;
    animation:axmDraw .5s ease forwards; }
  .axm-link.l1{animation-delay:.46s;} .axm-link.l2{animation-delay:.52s;}
  @keyframes axmDraw{ 0%{opacity:0; stroke-dashoffset:30;} 100%{opacity:.35; stroke-dashoffset:0;} }
  .axm-crystal{ stroke-dasharray:160; stroke-dashoffset:160; opacity:0;
    animation:axmCrystal .8s cubic-bezier(.65,0,.35,1) forwards, axmPulse 3.5s ease-in-out 1.6s infinite;
    animation-delay:.55s; will-change:filter; }
  @keyframes axmCrystal{ 0%{opacity:0; stroke-dashoffset:160;} 30%{opacity:1;} 100%{opacity:1; stroke-dashoffset:0;} }
  @keyframes axmPulse{ 0%,100%{ filter:drop-shadow(0 0 0px rgba(0,229,255,0)); } 50%{ filter:drop-shadow(0 0 6px rgba(0,229,255,.5)); } }
  .axm-fill{ opacity:0; animation:axmFill .6s ease forwards; animation-delay:1.15s; }
  @keyframes axmFill{ to{opacity:.08;} }
  .axm-axis{ opacity:0; animation:axmFill2 .5s ease forwards; animation-delay:1.2s; }
  @keyframes axmFill2{ to{opacity:.55;} }

  /* wordmark preview: keep Axiom clean, give only "orphe" the dot-forming reveal */
  .axm-axiom{ opacity:0;
    animation:axmAxiomIn .55s cubic-bezier(.22,1,.36,1) forwards; animation-delay:1.72s; }
  @keyframes axmAxiomIn{ to{ opacity:1; } }

  .axm-orphe-solid{ opacity:0;
    animation:axmOrpheSolid .55s ease forwards; animation-delay:2.15s; }
  @keyframes axmOrpheSolid{
    0%{opacity:0;}
    100%{opacity:1;}
  }

  .axm-word-dot{ opacity:0; transform-box:fill-box; transform-origin:center;
    animation:axmWordDotIn .65s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes axmWordDotIn{
    0%{ opacity:0; transform:translate(var(--dx), var(--dy)) scale(.25); }
    60%{ opacity:var(--o,.95); }
    100%{ opacity:0; transform:translate(0,0) scale(1); }
  }

  /* ---- content settling in after reveal ---- */
  .reveal{ opacity:0; transform:translateY(10px);
    animation:rise .7s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .slogan{ margin-top:-14px; font-weight:400; font-size:clamp(14px, 4vw, 16px);
    line-height:1.2; color:var(--muted); letter-spacing:.02em; animation-delay:2.45s; }
  .slogan .accent{ color:var(--cyan); }

  .rule{ width:46px;height:2px;margin:30px 0 21px;
    background:linear-gradient(90deg, transparent, var(--cyan), var(--orange), transparent);
    border-radius:2px; opacity:0; animation:ruleIn .8s ease forwards; animation-delay:2.62s; }
  @keyframes ruleIn{ to{ opacity:.9; } }

  .name{ margin-top:0; font-weight:600; font-size:clamp(22px, 6vw, 27px);
    line-height:1.12; letter-spacing:.04em; animation-delay:2.78s; }

  .role{ margin-top:8px; font-size:14px; font-weight:500; line-height:1.2; letter-spacing:.05em; color:var(--muted);
    animation-delay:2.86s; }

  .contact{ margin-top:30px; width:100%; max-width:320px;
    display:flex;flex-direction:column;gap:11px; animation-delay:3.02s; }
  .btn{ display:flex;align-items:center;justify-content:center;gap:10px; width:100%;
    font-family:inherit;font-size:15px;font-weight:600;letter-spacing:.02em;
    padding:15px 18px;border-radius:13px; text-decoration:none;
    transition:transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color:transparent; }
  .btn svg{flex:0 0 auto;}
  .btn-primary{ color:#04181C; background:linear-gradient(180deg, #38ecff, var(--cyan));
    box-shadow:0 8px 26px rgba(0,229,255,.22); }
  .btn-primary:active{ transform:scale(.98); box-shadow:0 4px 16px rgba(0,229,255,.22); }
  .btn-ghost{ color:var(--ink); background:rgba(240,244,248,.03); border:1px solid rgba(240,244,248,.16); }
  .btn-ghost:active{ transform:scale(.98); border-color:var(--cyan); }

  .foot{ margin-top:26px; font-size:11.5px;font-weight:500;letter-spacing:.16em;
    text-transform:uppercase; color:#4D5662; animation-delay:3.18s; }

  @media (prefers-reduced-motion: reduce){
    .axm-dot,.axm-link,.axm-crystal,.axm-fill,.axm-axis,.axm-wordmark-final,.axm-axiom,.axm-orphe-solid,.axm-word-dot,
    .reveal,.rule{ animation:none !important; opacity:1 !important; stroke-dashoffset:0 !important; transform:none !important; }
    .axm-link{opacity:.35 !important;} .axm-fill{opacity:.08 !important;} .axm-axis{opacity:.55 !important;}
    .rule{opacity:.9 !important;}
  }
</style>
</head>
<body>

  <div class="lang" role="group" aria-label="Language / Langue">
    <button id="btn-fr" type="button">FR</button>
    <button id="btn-en" type="button">EN</button>
  </div>

  <main class="card">

    <svg class="logo-axm" viewBox="0 0 320 80" role="img" aria-label="Axiomorphe">
      <title>Axiomorphe</title>
      <g>
        <circle class="axm-dot d1" cx="14" cy="22" r="2.4" fill="#FF6A00" style="--o:1"/>
        <circle class="axm-dot d2" cx="24" cy="14" r="1.9" fill="#FF6A00" style="--o:.75"/>
        <circle class="axm-dot d3" cx="11" cy="36" r="1.8" fill="#00E5FF" style="--o:.6"/>
        <circle class="axm-dot d4" cx="22" cy="30" r="1.6" fill="#FF6A00" style="--o:.85"/>
        <circle class="axm-dot d5" cx="16" cy="50" r="1.5" fill="#00E5FF" style="--o:.5"/>
        <circle class="axm-dot d6" cx="27" cy="42" r="1.4" fill="#FF6A00" style="--o:.6"/>
        <line class="axm-link l1" x1="26" y1="20" x2="42" y2="33" stroke="#00E5FF" stroke-width="1"/>
        <line class="axm-link l2" x1="25" y1="36" x2="42" y2="44" stroke="#00E5FF" stroke-width="1"/>
        <path class="axm-fill" d="M44 18 L62 40 L44 62 L26 40 Z" fill="#00E5FF"/>
        <path class="axm-crystal" d="M44 18 L62 40 L44 62 L26 40 Z" fill="none" stroke="#00E5FF" stroke-width="2.4" stroke-linejoin="round"/>
        <line class="axm-axis" x1="44" y1="18" x2="44" y2="62" stroke="#00E5FF" stroke-width="0.9"/>
        <line class="axm-axis" x1="26" y1="40" x2="62" y2="40" stroke="#00E5FF" stroke-width="0.9"/>
      </g>
      <defs>
        <clipPath id="axmOrpheClip">
          <text x="80" y="50" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
            <tspan fill="#F0F4F8">Axiom</tspan><tspan fill="#00E5FF">orphe</tspan>
          </text>
        </clipPath>
      </defs>

      <text class="axm-wordmark-final" x="80" y="50" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
        <tspan class="axm-axiom" fill="#F0F4F8">Axiom</tspan><tspan class="axm-orphe-solid" fill="#00E5FF">orphe</tspan>
      </text>

      <g clip-path="url(#axmOrpheClip)">
        <circle class="axm-word-dot" cx="174" cy="24" r="1.5" fill="#00E5FF" style="--dx:-10px;--dy:10px;--o:.95;animation-delay:1.78s"/>
        <circle class="axm-word-dot" cx="182" cy="27" r="1.3" fill="#00E5FF" style="--dx:-8px;--dy:-6px;--o:.8;animation-delay:1.82s"/>
        <circle class="axm-word-dot" cx="189" cy="32" r="1.6" fill="#00E5FF" style="--dx:-12px;--dy:6px;--o:.9;animation-delay:1.86s"/>
        <circle class="axm-word-dot" cx="176" cy="39" r="1.4" fill="#00E5FF" style="--dx:-7px;--dy:8px;--o:.75;animation-delay:1.90s"/>
        <circle class="axm-word-dot" cx="184" cy="43" r="1.25" fill="#00E5FF" style="--dx:-9px;--dy:-7px;--o:.78;animation-delay:1.94s"/>

        <circle class="axm-word-dot" cx="197" cy="25" r="1.45" fill="#00E5FF" style="--dx:-6px;--dy:7px;--o:.92;animation-delay:1.82s"/>
        <circle class="axm-word-dot" cx="205" cy="30" r="1.2" fill="#00E5FF" style="--dx:-10px;--dy:-5px;--o:.7;animation-delay:1.86s"/>
        <circle class="axm-word-dot" cx="211" cy="37" r="1.55" fill="#00E5FF" style="--dx:-11px;--dy:7px;--o:.9;animation-delay:1.90s"/>
        <circle class="axm-word-dot" cx="199" cy="43" r="1.35" fill="#00E5FF" style="--dx:-8px;--dy:8px;--o:.82;animation-delay:1.94s"/>

        <circle class="axm-word-dot" cx="221" cy="24" r="1.35" fill="#00E5FF" style="--dx:-7px;--dy:-6px;--o:.8;animation-delay:1.88s"/>
        <circle class="axm-word-dot" cx="230" cy="29" r="1.55" fill="#00E5FF" style="--dx:-10px;--dy:9px;--o:.9;animation-delay:1.92s"/>
        <circle class="axm-word-dot" cx="239" cy="25" r="1.25" fill="#00E5FF" style="--dx:-8px;--dy:-8px;--o:.76;animation-delay:1.96s"/>
        <circle class="axm-word-dot" cx="223" cy="37" r="1.6" fill="#00E5FF" style="--dx:-12px;--dy:4px;--o:.94;animation-delay:2.00s"/>
        <circle class="axm-word-dot" cx="233" cy="40" r="1.35" fill="#00E5FF" style="--dx:-10px;--dy:8px;--o:.8;animation-delay:2.04s"/>
        <circle class="axm-word-dot" cx="243" cy="43" r="1.2" fill="#00E5FF" style="--dx:-6px;--dy:-7px;--o:.72;animation-delay:2.08s"/>

        <circle class="axm-word-dot" cx="252" cy="24" r="1.45" fill="#00E5FF" style="--dx:-9px;--dy:8px;--o:.88;animation-delay:1.96s"/>
        <circle class="axm-word-dot" cx="260" cy="29" r="1.25" fill="#00E5FF" style="--dx:-7px;--dy:-5px;--o:.76;animation-delay:2.00s"/>
        <circle class="axm-word-dot" cx="267" cy="35" r="1.6" fill="#00E5FF" style="--dx:-11px;--dy:8px;--o:.92;animation-delay:2.04s"/>
        <circle class="axm-word-dot" cx="253" cy="43" r="1.35" fill="#00E5FF" style="--dx:-8px;--dy:7px;--o:.8;animation-delay:2.08s"/>

        <circle class="axm-word-dot" cx="274" cy="24" r="1.35" fill="#00E5FF" style="--dx:-7px;--dy:-7px;--o:.78;animation-delay:2.02s"/>
        <circle class="axm-word-dot" cx="282" cy="29" r="1.55" fill="#00E5FF" style="--dx:-10px;--dy:9px;--o:.9;animation-delay:2.06s"/>
        <circle class="axm-word-dot" cx="289" cy="24" r="1.2" fill="#00E5FF" style="--dx:-8px;--dy:-6px;--o:.72;animation-delay:2.10s"/>
        <circle class="axm-word-dot" cx="274" cy="36" r="1.55" fill="#00E5FF" style="--dx:-12px;--dy:5px;--o:.92;animation-delay:2.14s"/>
        <circle class="axm-word-dot" cx="283" cy="40" r="1.35" fill="#00E5FF" style="--dx:-8px;--dy:7px;--o:.8;animation-delay:2.18s"/>
        <circle class="axm-word-dot" cx="290" cy="43" r="1.25" fill="#00E5FF" style="--dx:-6px;--dy:-7px;--o:.72;animation-delay:2.22s"/>
      </g>
    </svg>

    <p class="slogan reveal" id="slogan">Là où les <span class="accent">idées</span> prennent forme</p>

    <div class="rule"></div>

    <h1 class="name reveal">Patrice Amos</h1>
    <p class="role reveal" id="role">Concepteur &amp; Développeur</p>

    <nav class="contact reveal">
      <a class="btn btn-primary" href="https://axiomorphe.ca" target="_blank" rel="noopener" id="websiteBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        Website
      </a>
      <a class="btn btn-ghost" href="mailto:Patrice.Amos@axiomorphe.ca" id="emailBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        Email
      </a>
    </nav>

  </main>

<script>
  var i18n = {
    fr: { lang:'fr', slogan:'Là où les <span class="accent">idées</span> prennent forme', role:'Concepteur &amp; Développeur', website:'Site internet', email:'Courriel' },
    en: { lang:'en', slogan:'Where <span class="accent">ideas</span> take shape',          role:'Designer &amp; Developer', website:'Website', email:'Email' }
  };

  var sloganEl = document.getElementById('slogan');
  var roleEl   = document.getElementById('role');
  var websiteBtn = document.getElementById('websiteBtn');
  var emailBtn   = document.getElementById('emailBtn');
  var btnFr    = document.getElementById('btn-fr');
  var btnEn    = document.getElementById('btn-en');

  function setLang(code){
    var t = i18n[code];
    sloganEl.innerHTML = t.slogan;
    roleEl.innerHTML   = t.role;
    websiteBtn.lastChild.textContent = ' ' + t.website;
    emailBtn.lastChild.textContent   = ' ' + t.email;
    document.documentElement.lang = t.lang;
    btnFr.classList.toggle('active', code === 'fr');
    btnEn.classList.toggle('active', code === 'en');
  }

  // French-default auto-detect: English only for clearly English-set phones.
  var nav = (navigator.language || 'fr').toLowerCase();
  setLang(nav.indexOf('en') === 0 ? 'en' : 'fr');

  btnFr.addEventListener('click', function(){ setLang('fr'); });
  btnEn.addEventListener('click', function(){ setLang('en'); });
</script>
</body>
</html>
